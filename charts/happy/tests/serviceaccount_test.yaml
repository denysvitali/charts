suite: service account
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should not render when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ServiceAccount when create is true
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should disable automountServiceAccountToken by default
    set:
      serviceAccount.create: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should include annotations when provided
    set:
      serviceAccount.create: true
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::123456789:role/my-role"
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789:role/my-role"

  - it: should use custom name when specified
    set:
      serviceAccount.create: true
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa
