suite: network policies
templates:
  - templates/networkpolicy.yaml
tests:
  # ---------------------------------------------------------------------------
  # Conditional rendering
  # ---------------------------------------------------------------------------
  - it: should not render any policies when networkPolicy.enabled is false
    set:
      networkPolicy.enabled: false
      smokeTest.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render only server policy when redis, ui, and smokeTest are disabled
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: false
      smokeTest.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NetworkPolicy
        documentIndex: 0

  - it: should render server + redis policies when redis enabled, ui disabled, smokeTest disabled
    set:
      networkPolicy.enabled: true
      redis.enabled: true
      ui.enabled: false
      smokeTest.enabled: false
    asserts:
      - hasDocuments:
          count: 2

  - it: should render server + ui policies when ui enabled, redis disabled, smokeTest disabled
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: true
      smokeTest.enabled: false
    asserts:
      - hasDocuments:
          count: 2

  - it: should render all three policies when redis and ui are enabled and smokeTest disabled
    set:
      networkPolicy.enabled: true
      redis.enabled: true
      ui.enabled: true
      smokeTest.enabled: false
    asserts:
      - hasDocuments:
          count: 3

  # ---------------------------------------------------------------------------
  # Document counts with smokeTest enabled
  # ---------------------------------------------------------------------------
  - it: should render server + smoke-test policies when only smokeTest is enabled
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: false
      smokeTest.enabled: true
    asserts:
      - hasDocuments:
          count: 2

  - it: should render server + redis + smoke-test policies when redis and smokeTest enabled
    set:
      networkPolicy.enabled: true
      redis.enabled: true
      ui.enabled: false
      smokeTest.enabled: true
    asserts:
      - hasDocuments:
          count: 3

  - it: should render server + ui + smoke-test policies when ui and smokeTest enabled
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: true
      smokeTest.enabled: true
    asserts:
      - hasDocuments:
          count: 3

  - it: should render four policies when redis, ui, and smokeTest all enabled
    set:
      networkPolicy.enabled: true
      redis.enabled: true
      ui.enabled: true
      smokeTest.enabled: true
    asserts:
      - hasDocuments:
          count: 4

  # ---------------------------------------------------------------------------
  # Server policy details
  # ---------------------------------------------------------------------------
  - it: server policy should allow ingress on port 3000
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: false
      smokeTest.enabled: false
    asserts:
      - equal:
          path: spec.ingress[0].ports[0].port
          value: 3000
        documentIndex: 0

  - it: server policy should include UI ingress rule when ui enabled
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: true
      smokeTest.enabled: false
    asserts:
      - equal:
          path: spec.ingress[1].from[0].podSelector.matchLabels.[app.kubernetes.io/component]
          value: ui
        documentIndex: 0

  - it: server policy should include smoke-test ingress rule when smokeTest enabled
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: false
      smokeTest.enabled: true
    asserts:
      - equal:
          path: spec.ingress[1].from[0].podSelector.matchLabels.[app.kubernetes.io/component]
          value: smoke-test
        documentIndex: 0

  - it: server policy should include redis egress when redis enabled
    set:
      networkPolicy.enabled: true
      redis.enabled: true
      ui.enabled: false
      smokeTest.enabled: false
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - podSelector:
                  matchLabels:
                    app.kubernetes.io/name: happy
                    app.kubernetes.io/instance: RELEASE-NAME
                    app.kubernetes.io/component: redis
            ports:
              - protocol: TCP
                port: 6379
        documentIndex: 0

  - it: server policy should use custom namespace selector for ingress controller
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: false
      smokeTest.enabled: false
      networkPolicy.ingressController.namespaceSelector.matchLabels:
        kubernetes.io/metadata.name: ingress-nginx
    asserts:
      - equal:
          path: spec.ingress[0].from[0].namespaceSelector.matchLabels.[kubernetes.io/metadata.name]
          value: ingress-nginx
        documentIndex: 0

  # ---------------------------------------------------------------------------
  # Redis policy details
  # ---------------------------------------------------------------------------
  - it: redis policy should allow ingress from server pods
    set:
      networkPolicy.enabled: true
      redis.enabled: true
      ui.enabled: false
      smokeTest.enabled: false
    asserts:
      - equal:
          path: spec.ingress[0].from[0].podSelector.matchLabels.[app.kubernetes.io/component]
          value: server
        documentIndex: 1
      - equal:
          path: spec.ingress[0].ports[0].port
          value: 6379
        documentIndex: 1

  - it: redis policy should allow ingress from smoke-test pod when smokeTest enabled
    set:
      networkPolicy.enabled: true
      redis.enabled: true
      ui.enabled: false
      smokeTest.enabled: true
    asserts:
      - equal:
          path: spec.ingress[1].from[0].podSelector.matchLabels.[app.kubernetes.io/component]
          value: smoke-test
        documentIndex: 1
      - equal:
          path: spec.ingress[1].ports[0].port
          value: 6379
        documentIndex: 1

  - it: redis policy should only allow DNS egress
    set:
      networkPolicy.enabled: true
      redis.enabled: true
      ui.enabled: false
      smokeTest.enabled: false
    asserts:
      - equal:
          path: spec.egress[0].ports[0].port
          value: 53
        documentIndex: 1
      - lengthEqual:
          path: spec.egress
          count: 1
        documentIndex: 1

  # ---------------------------------------------------------------------------
  # UI policy details
  # ---------------------------------------------------------------------------
  - it: ui policy should allow egress to server on port 3000
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: true
      smokeTest.enabled: false
    asserts:
      - equal:
          path: spec.egress[1].to[0].podSelector.matchLabels.[app.kubernetes.io/component]
          value: server
        documentIndex: 1
      - equal:
          path: spec.egress[1].ports[0].port
          value: 3000
        documentIndex: 1

  - it: ui policy should allow ingress on port 80
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: true
      smokeTest.enabled: false
    asserts:
      - equal:
          path: spec.ingress[0].ports[0].port
          value: 80
        documentIndex: 1

  - it: ui policy should allow ingress from smoke-test pod when smokeTest enabled
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: true
      smokeTest.enabled: true
    asserts:
      - equal:
          path: spec.ingress[1].from[0].podSelector.matchLabels.[app.kubernetes.io/component]
          value: smoke-test
        documentIndex: 1
      - equal:
          path: spec.ingress[1].ports[0].port
          value: 80
        documentIndex: 1

  # ---------------------------------------------------------------------------
  # Smoke-test NetworkPolicy details
  # ---------------------------------------------------------------------------
  - it: smoke-test policy should have only Egress policyType
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: false
      smokeTest.enabled: true
    asserts:
      - equal:
          path: spec.policyTypes
          value:
            - Egress
        documentIndex: 1

  - it: smoke-test policy should allow DNS egress
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: false
      smokeTest.enabled: true
    asserts:
      - contains:
          path: spec.egress
          content:
            ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53
        documentIndex: 1

  - it: smoke-test policy should allow egress to server on port 3000
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: false
      smokeTest.enabled: true
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - podSelector:
                  matchLabels:
                    app.kubernetes.io/name: happy
                    app.kubernetes.io/instance: RELEASE-NAME
                    app.kubernetes.io/component: server
            ports:
              - protocol: TCP
                port: 3000
        documentIndex: 1

  - it: smoke-test policy should allow egress to redis when redis enabled
    set:
      networkPolicy.enabled: true
      redis.enabled: true
      ui.enabled: false
      smokeTest.enabled: true
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - podSelector:
                  matchLabels:
                    app.kubernetes.io/name: happy
                    app.kubernetes.io/instance: RELEASE-NAME
                    app.kubernetes.io/component: redis
            ports:
              - protocol: TCP
                port: 6379
        documentIndex: 2

  - it: smoke-test policy should allow egress to UI when ui enabled
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: true
      smokeTest.enabled: true
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - podSelector:
                  matchLabels:
                    app.kubernetes.io/name: happy
                    app.kubernetes.io/instance: RELEASE-NAME
                    app.kubernetes.io/component: ui
            ports:
              - protocol: TCP
                port: 80
        documentIndex: 2

  - it: smoke-test policy should allow egress to postgres port when postgres enabled
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: false
      smokeTest.enabled: true
      postgres.enabled: true
    asserts:
      - contains:
          path: spec.egress
          content:
            ports:
              - protocol: TCP
                port: 5432
        documentIndex: 1

  - it: smoke-test policy should allow egress to S3 port when s3.host is set
    set:
      networkPolicy.enabled: true
      redis.enabled: false
      ui.enabled: false
      smokeTest.enabled: true
      s3.host: "minio.example.com"
      s3.port: "9000"
      postgres.enabled: false
      externalDatabase.url: "postgresql://x:x@db:5432/x"
      handyMasterSecret: "s"
    asserts:
      - contains:
          path: spec.egress
          content:
            ports:
              - protocol: TCP
                port: 9000
        documentIndex: 1
