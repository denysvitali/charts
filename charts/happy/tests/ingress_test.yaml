suite: ingress
templates:
  - templates/ingress.yaml
tests:
  - it: should not render when ingress.enabled is false
    set:
      ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render Ingress when enabled
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: happy.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - isKind:
          of: Ingress
      - isAPIVersion:
          of: networking.k8s.io/v1

  - it: should set ingressClassName when specified
    set:
      ingress.enabled: true
      ingress.className: nginx
      ingress.hosts:
        - host: happy.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: should configure TLS
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: happy.example.com
          paths:
            - path: /
              pathType: Prefix
      ingress.tls:
        - secretName: happy-tls
          hosts:
            - happy.example.com
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: happy-tls
      - contains:
          path: spec.tls[0].hosts
          content: happy.example.com

  - it: should include annotations
    set:
      ingress.enabled: true
      ingress.annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
      ingress.hosts:
        - host: happy.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/ssl-redirect"]
          value: "true"

  - it: should use service port for backend
    set:
      ingress.enabled: true
      service.port: 8080
      ingress.hosts:
        - host: happy.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8080
