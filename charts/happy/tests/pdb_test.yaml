suite: pod disruption budget
templates:
  - templates/pdb.yaml
tests:
  - it: should not render when podDisruptionBudget.enabled is false
    set:
      podDisruptionBudget.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render PDB when enabled
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - isAPIVersion:
          of: policy/v1

  - it: should use maxUnavailable by default
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.maxUnavailable: 1
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1
      - isNull:
          path: spec.minAvailable

  - it: should use minAvailable when specified
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: 2
    asserts:
      - equal:
          path: spec.minAvailable
          value: 2

  - it: should select server component pods
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: server

  - it: should set unhealthyPodEvictionPolicy to AlwaysAllow
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - equal:
          path: spec.unhealthyPodEvictionPolicy
          value: AlwaysAllow
