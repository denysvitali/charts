suite: external secret
templates:
  - templates/externalsecret.yaml
tests:
  - it: should not render when externalSecret.enabled is false
    set:
      externalSecret.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ExternalSecret when enabled
    set:
      externalSecret.enabled: true
      externalSecret.secretStoreRef.name: my-store
      externalSecret.secretStoreRef.kind: ClusterSecretStore
      externalSecret.remotePath: happy/prod
      externalSecret.refreshInterval: "1h"
    asserts:
      - isKind:
          of: ExternalSecret
      - isAPIVersion:
          of: external-secrets.io/v1

  - it: should reference the correct secret store
    set:
      externalSecret.enabled: true
      externalSecret.secretStoreRef.name: vault-backend
      externalSecret.secretStoreRef.kind: SecretStore
      externalSecret.remotePath: happy/prod
    asserts:
      - equal:
          path: spec.secretStoreRef.name
          value: vault-backend
      - equal:
          path: spec.secretStoreRef.kind
          value: SecretStore

  - it: should always include handy_master_secret data entry
    set:
      externalSecret.enabled: true
      externalSecret.secretStoreRef.name: store
      externalSecret.remotePath: app/config
      postgres.enabled: true
      s3.host: ""
    asserts:
      - contains:
          path: spec.data
          content:
            secretKey: handy_master_secret
            remoteRef:
              key: app/config
              property: handy_master_secret

  - it: should include S3 keys when s3.host is set
    set:
      externalSecret.enabled: true
      externalSecret.secretStoreRef.name: store
      externalSecret.remotePath: app/config
      postgres.enabled: true
      s3.host: "minio.example.com"
    asserts:
      - contains:
          path: spec.data
          content:
            secretKey: s3_access_key
            remoteRef:
              key: app/config
              property: s3_access_key
      - contains:
          path: spec.data
          content:
            secretKey: s3_secret_key
            remoteRef:
              key: app/config
              property: s3_secret_key

  - it: should omit S3 keys when s3.host is empty
    set:
      externalSecret.enabled: true
      externalSecret.secretStoreRef.name: store
      externalSecret.remotePath: app/config
      postgres.enabled: true
      s3.host: ""
    asserts:
      - notContains:
          path: spec.data
          content:
            secretKey: s3_access_key
          any: true

  - it: should include database_url when postgres is disabled
    set:
      externalSecret.enabled: true
      externalSecret.secretStoreRef.name: store
      externalSecret.remotePath: app/config
      postgres.enabled: false
    asserts:
      - contains:
          path: spec.data
          content:
            secretKey: database_url
            remoteRef:
              key: app/config
              property: database_url

  - it: should omit database_url when postgres is enabled
    set:
      externalSecret.enabled: true
      externalSecret.secretStoreRef.name: store
      externalSecret.remotePath: app/config
      postgres.enabled: true
      s3.host: ""
    asserts:
      - notContains:
          path: spec.data
          content:
            secretKey: database_url
          any: true

  - it: should set target name to fullname-config
    set:
      externalSecret.enabled: true
      externalSecret.secretStoreRef.name: store
      externalSecret.remotePath: app/config
    asserts:
      - matchRegex:
          path: spec.target.name
          pattern: -config$
      - equal:
          path: spec.target.creationPolicy
          value: Owner
