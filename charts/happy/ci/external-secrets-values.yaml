# CI values overlay: ExternalSecret path
# Validates the External Secrets Operator integration with all built-in
# components disabled and secrets sourced from an external secret store.

replicaCount: 1

postgres:
  enabled: false

redis:
  enabled: false
  externalUrl: "redis://external-redis.ci.example.com:6379"

ui:
  enabled: false

podDisruptionBudget:
  enabled: false

networkPolicy:
  enabled: false

# No inline secrets — everything comes from the ExternalSecret
handyMasterSecret: ""
existingSecret: ""

externalDatabase:
  url: ""

externalSecret:
  enabled: true
  refreshInterval: "1h"
  secretStoreRef:
    name: ci-cluster-secret-store
    kind: ClusterSecretStore
  remotePath: "happy/ci/config"

serviceAccount:
  create: true
