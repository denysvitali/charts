# Happy Server Helm Chart
# https://github.com/denysvitali/happy-server

replicaCount: 1

image:
  repository: ghcr.io/denysvitali/happy-server
  tag: "main"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: happy.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 512Mi

# -- Additional environment variables
extraEnv: []
# - name: MY_VAR
#   value: "my-value"

nodeSelector: {}
tolerations: []
affinity: {}

# =============================================================================
# Database Configuration
# =============================================================================

# -- Use built-in PostgreSQL (CloudNativePG)
# Set to false to use an external database
postgres:
  enabled: true
  instances: 1
  storageClass: "" # Uses default if empty
  storageSize: 10Gi

# -- External database URL (used when postgres.enabled=false)
# Can also be provided via existingSecret
externalDatabase:
  url: ""

# =============================================================================
# Redis Configuration
# =============================================================================

redis:
  # -- Deploy Redis alongside happy-server
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi

  podSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  # -- Use external Redis instead of built-in
  # Set redis.enabled=false and provide externalUrl
  externalUrl: ""

# =============================================================================
# S3 Storage Configuration
# =============================================================================

s3:
  # -- S3-compatible storage endpoint (without protocol)
  host: ""
  port: "443"
  useSSL: "true"
  bucket: ""
  # -- Public URL for the bucket (for generating public links)
  publicURL: ""
  # -- Credentials (if not using existingSecret)
  accessKey: ""
  secretKey: ""

# =============================================================================
# Secrets Configuration
# =============================================================================

# -- Master secret for encryption
handyMasterSecret: ""

# -- Use an existing secret instead of creating one
# The secret should contain: handy_master_secret, s3_access_key, s3_secret_key
existingSecret: ""

# -- External Secrets Operator integration
externalSecret:
  enabled: false
  refreshInterval: "1h"
  secretStoreRef:
    name: ""
    kind: ClusterSecretStore
  # -- Remote path in the secret store
  remotePath: ""

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
  # -- Annotations to add to the service account
  annotations: {}
  automountServiceAccountToken: false

# =============================================================================
# Upgrade Guard — Pre-flight & Post-upgrade Smoke Test Hooks
# =============================================================================
# Helm hook Jobs that gate every install and upgrade:
#   • preflight (pre-install/pre-upgrade): validates live cluster dependencies
#     (DB reachability, Redis TCP) before any manifest is applied.
#   • upgradeSmoke (post-install/post-upgrade): polls the newly deployed server
#     until it serves HTTP 200, or forces Helm — and any GitOps controller
#     watching it (ArgoCD, Flux) — to mark the release as FAILED.
#
# This turns `helm upgrade` from a fire-and-forget manifest apply into a
# safe, observable pipeline with hard pass/fail semantics at both ends.

upgradeGuard:
  # -- Master switch. Set to false to disable all upgrade guard Jobs entirely.
  enabled: true

  preflight:
    # -- Run a pre-install/pre-upgrade Job that checks live cluster
    # dependencies before any manifests are applied.
    enabled: true
    # -- Verify the database is reachable and accepting connections.
    checkDatabase: true
    # -- Verify Redis is reachable via TCP connect.
    checkRedis: true
    # -- Abort preflight if it has not completed within this many seconds.
    timeoutSeconds: 120

  upgradeSmoke:
    # -- Run a post-install/post-upgrade Job that polls the happy-server
    # Service. Helm marks the release FAILED if any probe does not
    # return the expected HTTP status within the retry budget.
    enabled: true
    # -- URL paths to probe on the happy-server Service.
    endpoints:
      - path: /healthz
    # -- Number of probe attempts per endpoint before declaring failure.
    retries: 24
    # -- Seconds to wait between retry attempts.
    retryIntervalSeconds: 5
    # -- Lightweight image used for HTTP probing (must have curl and sh).
    image:
      repository: curlimages/curl
      tag: 8.7.1
      pullPolicy: IfNotPresent

  argocd:
    # -- Emit argocd.argoproj.io/sync-wave annotations on hook Jobs and
    # core workloads so ArgoCD processes resources in dependency order.
    # Clusters without ArgoCD ignore these annotations harmlessly.
    #   wave -1 : preflight gate
    #   wave  0 : secrets, RBAC, NetworkPolicy, PDB
    #   wave  1 : Redis, CloudNativePG Cluster
    #   wave  5 : main server Deployment, Services, Ingress
    #   wave 10 : post-upgrade smoke test
    syncWaves: true

networkPolicy:
  # -- Enable NetworkPolicy resources
  enabled: true
  ingressController:
    # -- Namespace selector for the ingress controller
    namespaceSelector:
      matchLabels: {}

# -- Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  # Use maxUnavailable for single-replica deployments
  # minAvailable: 1  # Use for multi-replica
  maxUnavailable: 1

# =============================================================================
# Prometheus ServiceMonitor
# =============================================================================

serviceMonitor:
  # -- Enable Prometheus Operator ServiceMonitor
  enabled: false
  # -- Scrape interval
  interval: 30s
  # -- Scrape timeout
  scrapeTimeout: 10s
  # -- Metrics path
  path: /metrics
  # -- Additional labels to add to the ServiceMonitor (e.g. to match a Prometheus instance selector)
  additionalLabels: {}

# =============================================================================
# Smoke Test (helm test)
# =============================================================================

smokeTest:
  # -- Enable post-install smoke test Pod (runs via `helm test <release>`)
  enabled: true
  # -- Seconds each individual probe waits before timing out
  timeoutSeconds: "10"
  # -- When to delete the test Pod after completion
  # Options: before-hook-creation,hook-succeeded,hook-failed
  deletePolicy: before-hook-creation,hook-succeeded
  image:
    # -- Image used by the smoke test runner. Must have curl, nc (netcat), grep, sh.
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent

# =============================================================================
# UI Configuration
# =============================================================================

ui:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/denysvitali/happy
    tag: main
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 200m

  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
